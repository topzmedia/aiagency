version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: contentfinder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contentfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/contentfinder
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      APP_ENV: development
    volumes:
      - ./data:/data
      - ./apps/api:/app/apps/api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: celery -A workers.celery_app worker -l info -Q default,analysis,ingestion,search
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/contentfinder
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      APP_ENV: development
    volumes:
      - ./data:/data
      - ./apps/api:/app/apps/api
      - ./workers:/app/workers
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped

volumes:
  pgdata:

services:
  - type: web
    name: ai-ad-agency
    runtime: python
    buildCommand: pip install -r ai_ad_agency/requirements.txt && pip install fastapi uvicorn jinja2 python-multipart
    startCommand: uvicorn ai_ad_agency.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ROOT_PATH
        value: /agency
    disk:
      name: outputs
      mountPath: /app/ai_ad_agency/outputs
      sizeGB: 1
